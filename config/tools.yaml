# outofoffice -- LibreOffice document conversion.
#
# One route per supported target format, all under /to/<ext>.
# The shape is uniform across endpoints:
#
#   POST /to/<ext>
#     body:    multipart/form-data, field `document` = the input file
#     command: soffice-convert <input> <output> <ext>
#     output:  JSON with `output_files.converted.download_url`
#
# The wrapper at /app/bin/soffice-convert handles three soffice
# quirks (see the wrapper's header comment for the full
# rationale):
#
#   1. soffice picks its own output filename; wrapper renames
#      to the path url2code generated.
#   2. Concurrent invocations need per-invocation user-profile
#      directories.
#   3. soffice logs to stderr; wrapper merges to stdout so
#      url2code's text-mode parser surfaces failures.
#
# Source format is detected by LibreOffice from the upload's
# bytes / extension -- no need to declare it in the route.
# Cross-application conversions (e.g. .docx -> .xlsx) will fail
# at LibreOffice with a non-zero exit; common-sense applies.
#
# The list of supported target formats lives in
# config/formats.yaml (the canonical catalog). This file's
# /to/<ext> endpoints are checked against it by tests in CI.
# /formats serves the catalog (converted to JSON on the wire
# by bin/cat-yaml-as-json) so consumers can discover supported
# extensions without reading the README.

api:
  title: outofoffice
  version: "1.1.1"
  # API surface lives under /v1/. Liveness ``/`` and the
  # OpenAPI docs ``/docs`` / ``/redocs`` stay at the root.
  # Future breaking changes ship at /v2/ without disturbing
  # existing v1 clients.
  default_root: /v1

logging:
  level: INFO

endpoints:

  # ====================================================================
  # /formats -- discovery: the format catalog
  # ====================================================================

  - name: formats
    route: /formats
    method: GET
    description: >-
      Return the curated catalog of supported export formats.
      Each entry is a {ext, name, family} object; pass the
      `ext` field as the path suffix on /to/<ext> to convert
      to that format.
    command:
      # The catalog is authored as YAML (config/formats.yaml)
      # so operators can edit with comments. cat-yaml-as-json
      # converts to a JSON document on stdout; url2code's
      # native_json mode then parses it into `parsed_output`.
      executable: /app/bin/cat-yaml-as-json
      args:
        - "/app/config/formats.yaml"
      timeout_seconds: 5
    output:
      mode: native_json

  # ====================================================================
  # word processing / text
  # ====================================================================

  - name: to-pdf
    route: /to/pdf
    method: POST
    description: >-
      Convert an uploaded document to PDF (Portable Document Format) (.pdf).
      Returns a download URL for the converted output. Pass
      `pdfa=yes` for an archival PDF/A-1b file.
    command:
      executable: /app/bin/soffice-convert
      args:
        - "{input_path}"
        - "{output_path}"
        - "pdf"
      timeout_seconds: 60
    request:
      flags:
        # Optional export profile. yes -> PDF/A-1b (archival,
        # self-contained, validator-friendly); default plain PDF.
        # The wrapper turns this into LibreOffice's writer_pdf_Export
        # FilterData; it's the only profile knob today.
        - name: pdfa
          flag: --pdfa
          valuePrefix: ""
          type: enum
          choices: ["yes", "no"]
    uploads:
      - field_name: document
        placeholder: input_path
        temp_dir: /tmp/outofoffice/uploads
    output_files:
      - placeholder: output_path
        filename_placeholder: output_filename
        output_dir: /tmp/outofoffice/outputs
        suffix: .pdf
    output:
      mode: text

  - name: to-docx
