# Curated catalog of LibreOffice export formats outofoffice
# exposes.
#
# This file is the canonical source of truth for the format
# list. tools.yaml's per-format /to/<ext> endpoints are
# checked against it by tests in CI -- editing the catalog
# without updating the YAML (or vice versa) fails before
# merge.
#
# /formats serves this file (converted to JSON on the wire by
# bin/cat-yaml-as-json) so consumers can discover supported
# extensions without reading the README.
#
# Per-entry fields:
#   ext     URL-safe extension; becomes the route suffix
#           (/to/<ext>) and the on-disk extension on the
#           generated download URL.
#   name    Human-readable label (for clients).
#   family  Grouping for documentation + per-family
#           timeouts in tools.yaml. One of:
#             text     word-processing / text formats
#             sheet    spreadsheet formats
#             slides   presentation formats
#             drawing  vector / drawing formats
#             image    raster image formats
#             other    markup, postscript, latex
#
# Adding a format:
#   1. Add an entry below.
#   2. Add the matching `to-<ext>` endpoint block to
#      tools.yaml (copy any existing block, change the
#      route, suffix, and the third command arg to the
#      new ext).
# CI fails fast if (1) and (2) drift.

# ===== text / word processing =====

